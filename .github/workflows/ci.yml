name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  prisma-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @ai-vpn/api prisma:generate

      - name: Prisma validate schema
        run: pnpm --filter @ai-vpn/api exec prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_vpn_platform?schema=public

      - name: Prisma governance (single schema source)
        run: bash ./infra/scripts/check-prisma-governance.sh

      - name: Prisma migration governance (naming and structure)
        run: bash ./infra/scripts/check-prisma-migrations.sh

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prisma-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Prepare workspace dependencies
        run: |
          pnpm --filter @ai-vpn/shared-types build
          pnpm --filter @ai-vpn/shared-config build
          pnpm --filter @ai-vpn/shared-utils build
          pnpm --filter @ai-vpn/api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prisma-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Prepare workspace dependencies
        run: |
          pnpm --filter @ai-vpn/shared-types build
          pnpm --filter @ai-vpn/shared-config build
          pnpm --filter @ai-vpn/shared-utils build
          pnpm --filter @ai-vpn/api prisma:generate

      - name: Test
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - typecheck
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Prepare workspace dependencies
        run: |
          pnpm --filter @ai-vpn/shared-types build
          pnpm --filter @ai-vpn/shared-config build
          pnpm --filter @ai-vpn/shared-utils build
          pnpm --filter @ai-vpn/api prisma:generate

      - name: Build
        run: pnpm build

  release-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run release guard checks
        run: bash ./infra/scripts/check-release-guards.sh
